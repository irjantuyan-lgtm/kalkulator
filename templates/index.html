<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Web OOP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="kalkulator-container">
        <h2>Kalkulator Pintar</h2>
        
        <form method="POST">
            <input type="number" step="any" name="angka1" placeholder="Masukkan Angka 1" required>
            
            <select name="operasi">
                <option value="tambah">+</option>
                <option value="kurang">-</option>
                <option value="kali">x</option>
                <option value="bagi">/</option>
            </select>

            <input type="number" step="any" name="angka2" placeholder="Masukkan Angka 2" required>
            
            <button type="submit">Hitung</button>
        </form>

        {% if hasil is not none %}
            <div class="hasil">
                <h3>Hasil: {{ hasil }}</h3>
            </div>
        {% endif %}
    </div>

</body>
</html>
